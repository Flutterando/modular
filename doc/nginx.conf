server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compress text assets on the fly.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Docusaurus generates /path/index.html per route. Unknown routes return a
    # real 404 status, with Docusaurus's 404.html as the body (via error_page).
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
