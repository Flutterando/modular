name: flutter_modular_docs_mcp
description: >-
  MCP server that serves the flutter_modular documentation to AI coding clients
  as searchable resources plus a keyword search tool.
version: 0.2.3
repository: https://github.com/Flutterando/modular
homepage: https://modular.flutterando.com.br
topics:
  - mcp
  - flutter-modular
  - documentation

executables:
  flutter_modular_docs_mcp: server

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  dart_mcp: ^0.5.0
  stream_channel: ^2.1.4

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
